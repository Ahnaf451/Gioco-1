<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ti Pareva Facile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <canvas id="game" width="960" height="540" aria-label="Gioco platform ragebait"></canvas>

    <section class="overlay" id="startScreen">
      <div class="panel">
        <p class="eyebrow">Mini rage platformer</p>
        <h1>TI PAREVA FACILE</h1>
        <p class="copy">Salta, evita trappole invisibili e fidati pure dei checkpoint. Sicuro.</p>
        <button id="startBtn">START</button>
        <p class="hint">Muovi con WASD o frecce, salta con <b>Spazio</b>, riavvia con <b>R</b>.</p>
      </div>
    </section>

    <section class="overlay hidden" id="endScreen">
      <div class="panel">
        <p class="eyebrow">Complimenti, credo</p>
        <h2>Non hai vinto, ti ho solo lasciato passare.</h2>
        <button id="restartBtn">RIPROVA</button>
      </div>
    </section>

    <div class="hud">
      <div>Morti: <span id="deaths">0</span></div>
      <div>Tempo: <span id="time">0.0</span>s</div>
      <div id="msg">Premi START e soffri in pace.</div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
